# ============================================================================
# 淘宝用户行为分析系统 - 全局配置文件
# ============================================================================

# --------------------- 数据路径配置 ---------------------
data:
  # 原始CSV路径（HDFS）
  raw_path: "/data/raw/user_sample.csv"
  # 清洗后Parquet路径（HDFS）
  clean_path: "/data/clean/"
  # 分析结果输出路径（HDFS）
  output_path: "/data/output"

# --------------------- 数据过滤配置 ---------------------
filter:
  # 日期范围（北京时间）
  time_start: "2017-11-25"
  time_end: "2017-12-03"
  # 对应的Unix时间戳（秒，北京时间）
  timestamp_start: 1511539200    # 2017-11-25 00:00:00 CST
  timestamp_end: 1512316799      # 2017-12-03 23:59:59 CST

# --------------------- 分析参数配置 ---------------------
analysis:
  # 采样率（测试时使用小比例，正式运行设为1.0）
  sample_rate: 0.05

  # TOP-N 阈值
  top_n:
    item: 50           # 商品热度排行取前N
    category: 30       # 类目热度排行取前N
    cvr_item: 50       # 转化率商品排行取前N
    low_cvr_item: 50   # 低转化商品取前N

  # 转化率计算：最少浏览次数（低于此值的商品不计算转化率）
  min_pv_for_cvr: 10

  # RFM 加权评分模型
  rfm:
    # 权重（R和F的权重，总和为1）
    r_weight: 0.4
    f_weight: 0.6
    # R评分阈值（距最后日期的天数 → 分数）
    # 0-1天=5分, 2-3天=4分, 4-5天=3分, 6-7天=2分, 8+天=1分
    r_thresholds: [1, 3, 5, 7]
    # F评分阈值（购买次数 → 分数）
    # 1次=1分, 2次=2分, 3-4次=3分, 5-9次=4分, 10+次=5分
    f_thresholds: [1, 2, 4, 9]
    # 分层阈值（加权总分 → 用户层级）
    # 注意：所有RFM用户均为买家，F_score最低=1，total_score最低=1×0.4+1×0.6=1.0
    # 因此 pre_churn 阈值不能设为 1.0，否则"流失用户"永远为空
    segment_thresholds:
      high_value: 4.0     # ≥4.0 高价值用户
      potential: 3.0       # ≥3.0 潜力用户
      normal: 2.0          # ≥2.0 一般用户
      pre_churn: 1.4       # ≥1.4 预流失用户
      # <1.4 流失用户（仅R_score=1,F_score=1即1.0分的用户）

  # 会话分割：同一用户两次行为间隔超过此时间（分钟）视为新会话
  session_gap_minutes: 30

  # 模块开关：在此列出的模块ID将被禁用（覆盖模块默认的 MODULE_ENABLED）
  # CLI --skip/--enable 可临时覆盖此配置
  disabled: []
  # disabled:
  #   - "2.4"    # 关闭路径分析（运行较慢）
  #   - "2.6"    # 关闭时间分析

# --------------------- Spark 配置 ---------------------
spark:
  app_name: "UserBehavior_Analysis"
  timezone: "Asia/Shanghai"
  shuffle_partitions: 20
